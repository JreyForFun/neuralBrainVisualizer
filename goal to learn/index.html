<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Brain Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The background canvas where the magic happens -->
    <canvas id="neural-canvas"></canvas>

    <div id="ui-container">
        <!-- The Start Screen: Drag and Drop -->
        <div id="drop-screen">
            <h2>Initialize Neural Map</h2>
            <p>Drag and drop your data.json file here.</p>
            <input type="file" id="data-input" accept=".json">
        </div>

        <!-- The Dashboard: Hidden until data is loaded -->
        <div id="dashboard-screen" class="hidden">
            <div id="sidebar-left">
                <h3>System Nodes</h3>
                <ul id="node-list"></ul> 
            </div>

            <div id="inspector-right">
                <h3>Brain Node Data</h3>
                <div id="node-details">
                    <p>Click a node on the map to inspect.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
